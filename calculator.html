/* ── Scoring Engine ─────────────────────────────────────────────── */
function toKmPace(paceM, paceS, unit) {
  const total = parseFloat(paceM || 0) + parseFloat(paceS || 0) / 60;
  return unit === 'mi' ? total / 1.60934 : total;
}

function calcResults(data) {
  const isIM = data.distance === 'full';
  const sc = isIM ? 1.0 : 0.52;

  const giMap = {
    none:     { lo:0,  hi:0,  lbl:'No GI impact detected' },
    mild:     { lo:5,  hi:10, lbl:'Pace suppression' },
    moderate: { lo:15, hi:25, lbl:'Stops + pace drop' },
    severe:   { lo:30, hi:50, lbl:'Walking + multiple stops' },
  };
  const carbMap = {
    under40:  { lo:20, hi:35, lbl:'Significant bonk risk' },
    '40to60': { lo:10, hi:18, lbl:'Late-race energy deficit' },
    '60to80': { lo:4,  hi:10, lbl:'Moderate shortfall' },
    '80plus': { lo:0,  hi:4,  lbl:'Near-optimal' },
  };
  const bonkMap = {
    yes: { lo:8, hi:18, lbl:'Transition collapse' },
    no:  { lo:0, hi:5,  lbl:'Manageable' },
  };

  const gi   = giMap[data.gi]   || giMap.none;
  const carb = carbMap[data.carbs] || carbMap['60to80'];
  const bonk = bonkMap[data.secondHalf] || bonkMap.no;

  const giLo = Math.round(gi.lo * sc),   giHi = Math.round(gi.hi * sc);
  const cLo  = Math.round(carb.lo * sc), cHi  = Math.round(carb.hi * sc);
  const bLo  = Math.round(bonk.lo * sc), bHi  = Math.round(bonk.hi * sc);

  let pgLo = 0, pgHi = 0, pgConfirm = false;
  if (data.trainingPaceKmMin && data.raceSplitMin) {
    const dist = isIM ? 42.2 : 21.1;
    const expected = data.trainingPaceKmMin * 1.175 * dist;
    const gap = data.raceSplitMin - expected;
    if (gap > 5) {
      pgLo = Math.round(gap * 0.55);
      pgHi = Math.round(gap * 0.75);
      pgConfirm = true;
    }
  }

  const totalLo = Math.round(Math.max(giLo + bLo, cLo + bLo * 0.5));
  const totalHi = Math.round(Math.max(giHi + bHi, cHi + bHi * 0.5));

  return {
    totalLo, totalHi,
    giLo, giHi, giLbl: gi.lbl,
    cLo, cHi, cLbl: carb.lbl,
    bLo, bHi, bLbl: bonk.lbl,
    pgLo, pgHi, pgConfirm, isIM,
  };
}

/* ── Shared components ──────────────────────────────────────────── */
function Opt({ sel, onClick, title, desc }) {
  return (
    <button className={`s-option${sel ? ' picked' : ''}`} onClick={onClick}>
      <div className="s-option-radio"/>
      <div className="s-option-body">
        <span className="s-option-title">{title}</span>
        {desc && <span className="s-option-desc">{desc}</span>}
      </div>
    </button>
  );
}

function UnitToggle({ unit, setUnit }) {
  return (
    <div className="s-unit-toggle">
      <button className={`s-unit-btn${unit === 'km' ? ' on' : ''}`} onClick={() => setUnit('km')}>per km</button>

/* ── Animated number ─────────────────────────────────────────────── */
function Counter({ target }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let v = 0;
    const step = target / 40;
    const id = setInterval(() => {
      v += step;
      if (v >= target) { setN(target); clearInterval(id); }
      else setN(Math.round(v));
    }, 28);
    return () => clearInterval(id);
  }, [target]);
  return <>{n}</>;
}

function Results({ data, onRestart }) {
  const raceSplitMin = (data.splitH !== '' && data.splitM !== '')
    ? parseInt(data.splitH||0)*60 + parseInt(data.splitM||0) : null;
  const trainingPaceKmMin = data.paceM !== ''
    ? toKmPace(data.paceM, data.paceS, data.paceUnit||'km') : null;

  const r = calcResults({ ...data, raceSplitMin, trainingPaceKmMin });

  const insights = [];
  if (r.giLo > 0) insights.push(
    <><strong>GI distress alone is costing you {r.giLo}–{r.giHi} minutes.</strong> This is not a fitness issue. A structured gut training protocol reduces GI incidence by up to 47% in peer-reviewed research (de Oliveira, Burini & Jeukendrup, 2014).</>
  );
  if (r.cLo > 5) insights.push(

  );
  if (r.bLo > 0 && data.secondHalf === 'yes') insights.push(

const BLANK = { distance:'', splitH:'', splitM:'', paceM:'', paceS:'', paceUnit:'km',
                gi:'', secondHalf:'', carbs:'', practiced:'', motivation:'' };
const STEPS = ['Your race', 'GI symptoms', 'Fueling strategy', 'Your goal'];

const isValid = (step, d) => {
  if (step===1) return d.distance && d.splitH!=='' && d.splitM!=='';
  if (step===2) return d.gi && d.secondHalf;
  if (step===3) return d.carbs && d.practiced;
  if (step===4) return d.motivation;
};

  const restart = () => { setStep(1); setDone(false); setData(BLANK); scroll(); };

      {/* Header */}
      <header className="s-header">
        <div className="s-eyebrow">Race time analysis</div>
        <h1 className="s-headline">How many minutes are<br/>you <em>leaving behind?</em></h1>
        <p className="s-subhead">Enter your last race data. In 60 seconds, see exactly how much time correctable fueling errors are costing you — backed by peer-reviewed research.</p>
      </header>

      {!done ? <>
        {/* Progress */}
        <div className="s-progress-wrap">
          <div className="s-progress-meta">
            <span className="s-progress-label">{STEPS[step-1]}</span>
            <span className="s-progress-steps">{step} of 4</span>
          </div>
          <div className="s-progress-track">
            <div className="s-progress-fill" style={{ width:`${(step/4)*100}%` }}/>
          </div>
        </div>

        {/* Form card */}
        <div className="s-card">
          {step===1 && <Step1 d={data} set={setData}/>}
          {step===2 && <Step2 d={data} set={setData}/>}
          {step===3 && <Step3 d={data} set={setData}/>}
          {step===4 && <Step4 d={data} set={setData}/>}

          <div className="s-nav-row">
            {step > 1
              ? <button className="s-btn-back" onClick={back}>← Back</button>
              : <span/>
            }
            <button className="s-btn-next" onClick={next} disabled={!isValid(step,data)}>
              {step === 4 ? 'Calculate my minutes' : 'Continue'} →
            </button>

        <Results data={data} onRestart={restart}/>
